name: "Binny"
description: "Install binny managed tools"
inputs:
  cache-key-prefix:
    description: "Prefix all cache keys with this value"
    required: true
    default: "181053ac82"

runs:
  using: "composite"
  steps:
    - name: Check for binny config
      id: check-binny
      shell: bash
      run: |
        if [ -f ".binny.yaml" ]; then
          echo "exists=true" >> "$GITHUB_OUTPUT"
        else
          echo "exists=false" >> "$GITHUB_OUTPUT"
        fi

    # restore-only caching pattern: PRs (and pushes to fork default branches) read existing
    # caches but never write back. Only pushes to the upstream repo's default branch refresh
    # them. This keeps untrusted runs from polluting or evicting trusted cache entries.

    # tool cache: restore-only on non-default branches and forks
    - name: Restore tool cache
      if: ${{ steps.check-binny.outputs.exists == 'true' && (github.ref != format('refs/heads/{0}', github.event.repository.default_branch) || github.event.repository.fork == true) }}
      id: tool-cache
      uses: actions/cache/restore@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
      with:
        path: ${{ github.workspace }}/.tool
        key: ${{ inputs.cache-key-prefix }}-${{ runner.arch }}-${{ runner.os }}-tool-${{ hashFiles('.binny.yaml') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ runner.arch }}-${{ runner.os }}-tool

    # tool cache: restore + save only on upstream default branch
    - name: Restore and save tool cache
      if: ${{ steps.check-binny.outputs.exists == 'true' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event.repository.fork == false }}
      id: tool-cache-rw
      uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
      with:
        path: ${{ github.workspace }}/.tool
        key: ${{ inputs.cache-key-prefix }}-${{ runner.arch }}-${{ runner.os }}-tool-${{ hashFiles('.binny.yaml') }}
        restore-keys: |
          ${{ inputs.cache-key-prefix }}-${{ runner.arch }}-${{ runner.os }}-tool

    - name: Install binny
      if: steps.check-binny.outputs.exists == 'true'
      shell: bash
      run: |
        mkdir -p .tool
        curl -sSfL https://get.anchore.io/binny | sh -s -- -b .tool

    - name: Install project tools
      if: steps.check-binny.outputs.exists == 'true'
      shell: bash
      env:
        # required by binny to resolve `version: want: latest` tools and to
        # enforce cooldown via the GitHub v4 API (works with contents: read).
        GITHUB_TOKEN: ${{ github.token }}
      run: |
        .tool/binny install
        .tool/binny list
        .tool/binny check
