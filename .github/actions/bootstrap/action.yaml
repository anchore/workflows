name: "Bootstrap"
description: "Bootstrap complete development environment (go-make + tools + Python)"

# This action is a thin wrapper around anchore/go-make/.github/actions/setup which
# handles checkout, setup-go, restore-only build/mod cache, and the binny tool cache.
# Python tooling (uv + setup-python + uv sync) is inlined here with the same
# restore-only cache pattern so a single action sets up everything this repo needs.

inputs:
  go-version:
    description: "Go version to install (passed to go-make/setup)"
    required: false
    default: "1.26.2"
  python-version:
    description: "Python version to install"
    required: false
    default: "3.13"
  uv-version:
    description: "UV version to install"
    required: false
    default: "0.7.x"
  cache-key-prefix:
    description: "Prefix all cache keys with this value"
    required: false
    default: "181053ac82"
  cache-enabled:
    description: "Enable build/mod and tool caching"
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    # setup go, go-make, binny, and restore-only build/mod + tool caches
    - name: Setup go + go-make tooling
      uses: anchore/go-make/.github/actions/setup@9de27be11ed73e2f9d5406a836a492b7d8aa1225 # v0.5.0
      with:
        go-version: ${{ inputs.go-version }}
        cache-dependency-path: .make/go.sum
        cache-key-prefix: ${{ inputs.cache-key-prefix }}
        cache-enabled: ${{ inputs.cache-enabled }}

    - name: Install binny-managed tools
      shell: bash
      run: make binny:install

    # restore-only caching pattern: PRs (and pushes to fork default branches) read existing
    # caches but never write back. Only pushes to the upstream repo's default branch refresh
    # them. This keeps untrusted runs from polluting or evicting trusted cache entries.
    - name: Install uv
      uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
      with:
        version: ${{ inputs.uv-version }}
        enable-cache: true
        save-cache: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event.repository.fork == false }}

    - name: Set up Python
      uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install project dependencies
      shell: bash
      run: uv sync --extra dev
