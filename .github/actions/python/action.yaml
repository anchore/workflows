name: "Python"
description: "Set up Python environment with uv and dependencies"

inputs:
  python-version:
    description: "Python version to use"
    required: false
    default: "3.13"
  uv-version:
    description: "UV version to use"
    required: false
    default: "0.7.x"
  cache-key-prefix:
    description: "Cache key prefix for tool caching"
    required: false
    default: "181053ac82"

runs:
  using: "composite"
  steps:
    # restore-only caching pattern: PRs (and pushes to fork default branches) read existing
    # caches but never write back. Only pushes to the upstream repo's default branch refresh
    # them. This keeps untrusted runs from polluting or evicting trusted cache entries.
    - name: Install uv
      uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        version: ${{ inputs.uv-version }}
        enable-cache: true
        save-cache: ${{ github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event.repository.fork == false }}

    - name: Set up Python
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}

    # tool cache: restore-only on non-default branches and forks
    - name: Restore tool cache
      if: ${{ inputs.tools == 'true' && (github.ref != format('refs/heads/{0}', github.event.repository.default_branch) || github.event.repository.fork == true) }}
      id: tool-cache
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ${{ github.workspace }}/.tool
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-tool-${{ hashFiles('.binny.yaml') }}

    # tool cache: restore + save only on upstream default branch
    - name: Restore and save tool cache
      if: ${{ inputs.tools == 'true' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch) && github.event.repository.fork == false }}
      id: tool-cache-rw
      uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
      with:
        path: ${{ github.workspace }}/.tool
        key: ${{ inputs.cache-key-prefix }}-${{ runner.os }}-tool-${{ hashFiles('.binny.yaml') }}

    - name: Install project dependencies
      shell: bash
      run: uv sync --extra dev
