# Description:
#   Performs CodeQL security analysis on a JavaScript/TypeScript codebase. Uses
#   `build-mode: none` so no `npm install` or compile step is required; CodeQL
#   extracts directly from source (TypeScript is analyzed as JavaScript via the
#   shared `javascript-typescript` extractor). Defaults to the
#   `security-and-quality` query suite. Results are uploaded to the GitHub
#   Security tab.
#
#   For most repos prefer the umbrella `codeql.yaml` workflow, which can run
#   this analysis alongside other CodeQL languages from a single shim call.
#
# Permissions:
#   security-events: write  # to upload CodeQL results to GitHub Security tab
#   contents: read          # to checkout the repository
#
# Required Secrets:
#   None
#
# Usage Example:
#   permissions:
#     contents: read
#     security-events: write
#   jobs:
#     codeql-javascript:
#       uses: anchore/workflows/.github/workflows/codeql-javascript.yaml@main

name: "CodeQL JavaScript Analysis"

on:
  workflow_call:
    inputs:
      queries:
        description: "CodeQL query suite (default | security-extended | security-and-quality). Ignored when `config-file` is set."
        required: false
        type: string
        default: "security-and-quality"
      config-file:
        description: "Optional path to a CodeQL config file. When set, takes precedence over `queries`."
        required: false
        type: string
        default: ""
      runs-on:
        description: "Runner to use"
        required: false
        type: string
        default: "ubuntu-latest"

permissions: {}

jobs:
  run:
    name: Run
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 25
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          # `javascript-typescript` covers both .js and .ts in one extractor.
          languages: javascript-typescript
          build-mode: none
          queries: ${{ inputs.queries }}
          config-file: ${{ inputs.config-file }}

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:javascript-typescript"
