name: "Runson Validations"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "src/runson/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/validations-runson.yaml"
  push:
    branches:
      - main
    paths:
      - "src/runson/**"
      - "tests/**"
      - "pyproject.toml"
      - "uv.lock"

permissions: {}

jobs:
  Static-Analysis:
    name: "Static analysis"
    runs-on: ubuntu-24.04
    permissions:
      contents: read  # for checkout
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap

      - name: Run static analysis
        run: make runson:static-analysis

  Test:
    name: "Tests"
    runs-on: ubuntu-24.04
    permissions:
      contents: read  # for checkout
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Bootstrap environment
        uses: ./.github/actions/bootstrap

      - name: Run tests
        run: make runson:test
