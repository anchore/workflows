# Description:
#   Performs CodeQL security analysis on a Go codebase. By default the project
#   is built with `go build ./...` (override via `build-command`) and analyzed
#   with the `security-and-quality` query suite. Results are uploaded to the
#   GitHub Security tab.
#
#   For most repos prefer the umbrella `codeql.yaml` workflow, which can run
#   this analysis alongside other CodeQL languages from a single shim call.
#
# Permissions:
#   security-events: write  # to upload CodeQL results to GitHub Security tab
#   contents: read          # to checkout the repository
#
# Required Secrets:
#   None
#
# Usage Example:
#   permissions:
#     contents: read
#     security-events: write
#   jobs:
#     codeql-go:
#       uses: anchore/workflows/.github/workflows/codeql-go.yaml@main

name: "CodeQL Go Analysis"

on:
  workflow_call:
    inputs:
      working-directory:
        description: "Working directory for Go commands"
        required: false
        type: string
        default: "."
      go-version-file:
        description: "Path to go.mod (or go.work) used to derive the Go version"
        required: false
        type: string
        default: "go.mod"
      build-command:
        description: "Command used to build the Go project so CodeQL can index it"
        required: false
        type: string
        default: "go build ./..."
      queries:
        description: "CodeQL query suite (default | security-extended | security-and-quality). Ignored when `config-file` is set."
        required: false
        type: string
        default: "security-and-quality"
      config-file:
        description: "Optional path to a CodeQL config file (e.g. .github/codeql/codeql-config.yml). When set, takes precedence over `queries`."
        required: false
        type: string
        default: ""
      runs-on:
        description: "Runner to use"
        required: false
        type: string
        default: "ubuntu-latest"

permissions: {}

jobs:
  run:
    name: Run
    runs-on: ${{ inputs.runs-on }}
    timeout-minutes: 25
    permissions:
      security-events: write
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 2
          persist-credentials: false

      - name: Detect Go module
        id: detect
        working-directory: ${{ inputs.working-directory }}
        shell: bash
        env:
          GO_VERSION_FILE: ${{ inputs.go-version-file }}
        run: |
          # gracefully skip when there is nothing for CodeQL to index. This
          # lets the umbrella workflow default to `languages: "go,actions"`
          # safely across the fleet without each non-Go repo having to override.
          if [[ -f "${GO_VERSION_FILE}" || -f go.work ]]; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
            echo "::notice title=CodeQL Go::no ${GO_VERSION_FILE} or go.work found in ${PWD}; skipping Go analysis"
          fi

      - name: Setup Go
        if: steps.detect.outputs.found == 'true'
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ${{ inputs.go-version-file }}
          check-latest: true

      - name: Initialize CodeQL
        if: steps.detect.outputs.found == 'true'
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          languages: go
          build-mode: manual
          # codeql-action ignores `queries` when `config-file` defines its own,
          # so passing both lets the default suite still apply when no config is provided.
          queries: ${{ inputs.queries }}
          config-file: ${{ inputs.config-file }}

      - name: Download dependencies
        if: steps.detect.outputs.found == 'true'
        working-directory: ${{ inputs.working-directory }}
        run: |
          go mod download
          go mod verify

      - name: Build
        if: steps.detect.outputs.found == 'true'
        working-directory: ${{ inputs.working-directory }}
        env:
          BUILD_COMMAND: ${{ inputs.build-command }}
        run: |
          # eval (not direct expansion) so callers can pass compound commands
          # like `make build` or `go generate ./... && go build ./...`.
          eval "${BUILD_COMMAND}"

      - name: Perform CodeQL Analysis
        if: steps.detect.outputs.found == 'true'
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9 # v4.37.0
        with:
          category: "/language:go"
